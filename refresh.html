<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; object-src 'none'; base-uri 'none'">
    <meta name="theme-color" content="#f2f2f7">
    <title>更新训练日志</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: #f2f2f7;
            color: #1c1c1e;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        }
        main {
            width: min(100%, 360px);
            padding: 28px 24px;
            border-radius: 24px;
            background: #fff;
            text-align: center;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }
        .spinner {
            width: 36px;
            height: 36px;
            margin: 0 auto 18px;
            border: 4px solid #dbeafe;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        h1 { margin: 0 0 8px; font-size: 21px; }
        p { margin: 0; color: #6b7280; font-size: 14px; line-height: 1.6; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <main>
        <div class="spinner" aria-hidden="true"></div>
        <h1>正在更新训练日志</h1>
        <p id="status">正在移除旧版本缓存，训练记录会保留。</p>
    </main>
    <script>
        (async () => {
            try {
                if ('serviceWorker' in navigator) {
                    const registration = await navigator.serviceWorker.getRegistration('./');
                    if (registration) await registration.unregister();
                }
                if ('caches' in window) {
                    const keys = await caches.keys();
                    await Promise.all(keys
                        .filter(key => key.startsWith('personal-workout-log-'))
                        .map(key => caches.delete(key)));
                }
            } catch (error) {
                console.warn('App cache reset failed', error);
            }
            document.getElementById('status').textContent = '更新完成，正在打开最新版本…';
            window.location.replace(`./?updated=${Date.now()}`);
        })();
    </script>
</body>
</html>
